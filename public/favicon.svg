<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="32" fill="#15803d"/>
  <!-- Body -->
  <ellipse cx="29" cy="40" rx="14" ry="11" fill="white" opacity="0.95"/>
  <!-- Head -->
  <circle cx="42" cy="27" r="10" fill="white" opacity="0.95"/>
  <!-- Comb -->
  <ellipse cx="40" cy="17" rx="3.5" ry="4.5" fill="#dc2626"/>
  <ellipse cx="44" cy="15" rx="3" ry="4" fill="#dc2626"/>
  <ellipse cx="48" cy="17" rx="3" ry="4" fill="#dc2626"/>
  <!-- Wattle -->
  <ellipse cx="46" cy="31" rx="2.5" ry="3.5" fill="#dc2626"/>
  <!-- Beak -->
  <polygon points="51,27 57,25 57,29" fill="#eab308"/>
  <!-- Eye -->
  <circle cx="44" cy="25" r="2.5" fill="#1e3a5f"/>
  <circle cx="44.8" cy="24.2" r="0.9" fill="white"/>
  <!-- Tail feathers -->
  <ellipse cx="16" cy="34" rx="6" ry="4" fill="#eab308" transform="rotate(-35 16 34)"/>
  <ellipse cx="13" cy="39" rx="5" ry="3" fill="#dc2626" transform="rotate(-55 13 39)"/>
  <!-- Legs -->
  <rect x="24" y="49" width="4" height="8" rx="2" fill="#eab308"/>
  <rect x="32" y="49" width="4" height="8" rx="2" fill="#eab308"/>
  <!-- Feet -->
  <line x1="24" y1="57" x2="18" y2="61" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="57" x2="24" y2="63" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="57" x2="42" y2="61" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="57" x2="36" y2="63" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
</svg>
